<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Untamed Merch</title>

  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Untamed Merch" />

  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      width: 100%;
      overflow: hidden;

      /* Prevent content from going under the notch */
      padding-top: env(safe-area-inset-top);
    }

    /* Fullscreen iframe loads immediately */
    #app {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;

      /* Adjust height so content sits below the notch */
      height: calc(100vh - env(safe-area-inset-top));

      border: none;
      z-index: 1;
      box-sizing: border-box;
      padding-top: env(safe-area-inset-top);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Splash overlay */
    #splash {
      position: fixed;
      top: 0; 
      left: 0;
      width: 100vw;
      height: 100vh;
      background: url('untamed-merch-splash-1290x2796.png') center/cover no-repeat;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1s ease-out;
    }
  </style>
</head>

<body>

  <!-- Fullscreen app loads immediately -->
  <div id="app">
    <iframe src="https://untamed-fitness-training.printify.me/"></iframe>
  </div>

  <!-- Splash overlay -->
  <div id="splash"></div>

  <script>
    window.addEventListener('load', () => {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {

          // Fade out splash after 7 seconds
          setTimeout(() => {
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';

            // Remove splash from DOM completely after fade
            setTimeout(() => {
              if (splash && splash.parentNode) {
                splash.parentNode.removeChild(splash);
              }
            }, 1000);

          }, 7000);

        });
      });
    });
  </script>

</body>
</html>
